name: Generate Profile Assets

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "scripts/build-profile-assets.js"
      - ".github/workflows/profile-assets.yml"

permissions:
  contents: write

jobs:
  build-profile-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate profile SVG assets
        run: node scripts/build-profile-assets.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/activity-dashboard.svg assets/project-compendium.svg assets/research-radar.svg assets/system-loop.svg
          git diff --cached --quiet || git commit -m "chore: update generated profile assets"
          git push
