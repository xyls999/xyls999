<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Current focus board</title>
  <desc id="desc">A concise board for personal goals, recent pushes, and learning direction.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101826"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <style>
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .mono{font-family:Consolas,Monaco,monospace}
      .title{fill:#F2B35D;font:800 30px Segoe UI,Arial,sans-serif}
      .muted{fill:#8B949E;font:14px Consolas,Monaco,monospace}
      .body{fill:#F5F2E8;font:16px Segoe UI,Arial,sans-serif}
      .tag{fill:#7DCFFF;font:13px Consolas,Monaco,monospace}
    </style>
  </defs>
  <rect width="1200" height="300" rx="16" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="256" rx="14" fill="url(#panel)" stroke="#214E68"/>
  <text x="54" y="70" class="title">Current Focus</text>
  <text x="54" y="98" class="muted">personal direction / recent work / next goals</text>
  <g transform="translate(54 126)">
    <rect width="330" height="106" rx="12" fill="#0D1117" stroke="#214E68"/>
    <text x="22" y="32" class="tag">PROFILE</text>
    <text x="22" y="62" class="body">大数据管理与应用</text>
    <text x="22" y="88" class="muted">data, backend, visualization</text>
  </g>
  <g transform="translate(435 126)">
    <rect width="330" height="106" rx="12" fill="#0D1117" stroke="#214E68"/>
    <text x="22" y="32" class="tag">RECENT PUSH</text>
    <text x="22" y="62" class="body">整理项目结构和自动化页面</text>
    <text x="22" y="88" class="muted">README, workflow, assets</text>
  </g>
  <g transform="translate(816 126)">
    <rect width="330" height="106" rx="12" fill="#0D1117" stroke="#214E68"/>
    <text x="22" y="32" class="tag">NEXT GOAL</text>
    <text x="22" y="62" class="body">沉淀可展示、可复用的工程作品</text>
    <text x="22" y="88" class="muted">tests, docs, demos</text>
  </g>
</svg>
