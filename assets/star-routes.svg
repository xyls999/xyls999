<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Star routes</title>
  <desc id="desc">A dark-mode friendly local star history style chart.</desc>
  <defs>
    <linearGradient id="lineA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DCFFF"/>
      <stop offset="1" stop-color="#F2B35D"/>
    </linearGradient>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1200" height="260" rx="16" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="216" rx="14" fill="#101826" stroke="#214E68"/>
  <text x="54" y="66" class="ui" font-size="30" font-weight="800" fill="#F2B35D">Star Routes</text>
  <text x="54" y="94" class="mono" font-size="14" fill="#8B949E">A stable dark-mode route chart. External Star History is tucked into details below.</text>
  <g transform="translate(92 118)">
    <path d="M0 92H990" stroke="#214E68"/>
    <path d="M0 46H990" stroke="#214E68" opacity=".55"/>
    <path d="M0 0H990" stroke="#214E68" opacity=".35"/>
    <path d="M0 92 C120 88 190 77 260 42 C338 3 448 22 536 14 C646 4 738 32 827 25 C912 18 944 9 990 14" fill="none" stroke="url(#lineA)" stroke-width="4"/>
    <path d="M0 92 C168 90 248 95 335 82 C423 70 484 54 620 58 C724 61 838 49 990 52" fill="none" stroke="#F7768E" stroke-width="3" opacity=".85"/>
    <path d="M0 92 C210 86 350 91 522 77 C668 65 780 78 990 70" fill="none" stroke="#7DCFFF" stroke-width="3" opacity=".72"/>
    <g fill="#F2B35D">
      <circle cx="260" cy="42" r="5"/>
      <circle cx="536" cy="14" r="5"/>
      <circle cx="990" cy="14" r="5"/>
    </g>
    <g class="mono" font-size="12" fill="#8B949E">
      <text x="0" y="120">spawn</text>
      <text x="470" y="120">mid-game</text>
      <text x="934" y="120">now</text>
    </g>
  </g>
  <g class="mono" font-size="13" fill="#F5F2E8">
    <rect x="840" y="54" width="18" height="4" fill="#F2B35D"/>
    <text x="866" y="60">profile</text>
    <rect x="940" y="54" width="18" height="4" fill="#F7768E"/>
    <text x="966" y="60">projects</text>
  </g>
