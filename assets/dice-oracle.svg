<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">Dice oracle</title>
  <desc id="desc">A tabletop RPG dice panel with animated roll results for profile traits.</desc>
  <defs>
    <linearGradient id="die" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7768E"/>
      <stop offset=".5" stop-color="#F2B35D"/>
      <stop offset="1" stop-color="#7DCFFF"/>
    </linearGradient>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .roll{transform-origin:202px 164px;animation:roll 6s ease-in-out infinite}
      .spark{animation:spark 2.6s ease-in-out infinite}
      @keyframes roll{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
      @keyframes spark{0%,100%{opacity:.25}50%{opacity:1}}
    </style>
  </defs>
  <rect width="1200" height="320" rx="18" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="276" rx="16" fill="#101826" stroke="#214E68"/>
  <text x="54" y="70" class="ui" font-size="30" font-weight="800" fill="#F2B35D">Dice Oracle</text>
  <text x="54" y="98" class="mono" font-size="14" fill="#8B949E">tabletop rolls for the current build temperament</text>
  <g class="roll">
    <path d="M202 72 286 122 260 222 202 270 144 222 118 122Z" fill="url(#die)" opacity=".88"/>
    <path d="M202 72 202 270M118 122 260 222M286 122 144 222" stroke="#0D1117" stroke-width="4" opacity=".55"/>
    <text x="202" y="177" text-anchor="middle" class="ui" font-size="54" font-weight="900" fill="#0D1117">20</text>
  </g>
  <g class="spark" fill="#F2B35D">
    <path d="M310 70 318 91 341 98 318 105 310 126 302 105 279 98 302 91Z"/>
    <path d="M91 220 97 236 114 242 97 248 91 264 85 248 68 242 85 236Z"/>
  </g>
  <g transform="translate(420 96)">
    <g>
      <rect width="650" height="34" rx="17" fill="#0D1117" stroke="#214E68"/>
      <rect width="585" height="34" rx="17" fill="#7DCFFF" opacity=".62"/>
      <text x="18" y="23" class="mono" font-size="14" fill="#0D1117">TRACE CHECK</text>
      <text x="610" y="23" class="mono" font-size="14" fill="#F5F2E8">20</text>
    </g>
    <g transform="translate(0 52)">
      <rect width="650" height="34" rx="17" fill="#0D1117" stroke="#214E68"/>
      <rect width="520" height="34" rx="17" fill="#F2B35D" opacity=".72"/>
      <text x="18" y="23" class="mono" font-size="14" fill="#0D1117">BUILD CHECK</text>
      <text x="610" y="23" class="mono" font-size="14" fill="#F5F2E8">18</text>
    </g>
    <g transform="translate(0 104)">
      <rect width="650" height="34" rx="17" fill="#0D1117" stroke="#214E68"/>
      <rect width="474" height="34" rx="17" fill="#F7768E" opacity=".68"/>
      <text x="18" y="23" class="mono" font-size="14" fill="#0D1117">CHAOS RESIST</text>
      <text x="610" y="23" class="mono" font-size="14" fill="#F5F2E8">17</text>
    </g>
    <g transform="translate(0 156)">
      <rect width="650" height="34" rx="17" fill="#0D1117" stroke="#214E68"/>
      <rect width="620" height="34" rx="17" fill="#A9DC76" opacity=".65"/>
      <text x="18" y="23" class="mono" font-size="14" fill="#0D1117">RETURN SAVE</text>
      <text x="596" y="23" class="mono" font-size="14" fill="#F5F2E8">999</text>
    </g>
  </g>
</svg>
