<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Boss terminal</title>
  <desc id="desc">A dark game UI terminal showing current build quests.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D1117"/>
      <stop offset="1" stop-color="#16263A"/>
    </linearGradient>
    <linearGradient id="hp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F7768E"/>
      <stop offset="0.55" stop-color="#F2B35D"/>
      <stop offset="1" stop-color="#7DCFFF"/>
    </linearGradient>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .blink{animation:blink 1.5s steps(2,end) infinite}
      @keyframes blink{50%{opacity:.25}}
    </style>
  </defs>
  <rect width="1200" height="300" rx="16" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="256" rx="14" fill="url(#panel)" stroke="#214E68" stroke-width="2"/>
  <g transform="translate(50 48)">
    <text class="mono" x="0" y="18" font-size="15" fill="#7DCFFF">BOSS RAID // CURRENT BUILD</text>
    <text class="ui" x="0" y="63" font-size="38" font-weight="800" fill="#F5F2E8">Chaos to Trace</text>
    <text class="ui" x="0" y="96" font-size="17" fill="#8B949E">Turn loose ideas into runnable tools, measured workflows, and artifacts that can be returned to.</text>
    <rect x="0" y="126" width="535" height="22" rx="11" fill="#070A12" stroke="#214E68"/>
    <rect x="4" y="130" width="420" height="14" rx="7" fill="url(#hp)"/>
    <text class="mono" x="452" y="143" font-size="13" fill="#F2B35D">HP 78%</text>
    <g transform="translate(0 176)">
      <rect width="156" height="40" rx="10" fill="#214E68" fill-opacity="0.55"/>
      <rect x="174" width="156" height="40" rx="10" fill="#351C2A" fill-opacity="0.72"/>
      <rect x="348" width="156" height="40" rx="10" fill="#5B3B1A" fill-opacity="0.72"/>
      <text class="mono" x="18" y="25" font-size="14" fill="#F5F2E8">PLAN</text>
      <text class="mono" x="192" y="25" font-size="14" fill="#F5F2E8">BUILD</text>
      <text class="mono" x="366" y="25" font-size="14" fill="#F5F2E8">VERIFY</text>
    </g>
  </g>
  <g transform="translate(672 48)">
    <rect width="456" height="205" rx="12" fill="#070A12" stroke="#214E68"/>
    <text class="mono" x="24" y="36" font-size="15" fill="#F2B35D">COMBAT LOG</text>
    <text class="mono" x="24" y="72" font-size="14" fill="#7DCFFF">[01] agent route: tool calling online</text>
    <text class="mono" x="24" y="105" font-size="14" fill="#F5F2E8">[02] device route: MCP channel mapped</text>
    <text class="mono" x="24" y="138" font-size="14" fill="#F5F2E8">[03] system route: OS lab indexed</text>
    <text class="mono" x="24" y="171" font-size="14" fill="#F7768E">[04] next: reduce entropy, ship artifact</text>
    <rect class="blink" x="24" y="187" width="12" height="4" fill="#7DCFFF"/>
  </g>
</svg>
