<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="170" viewBox="0 0 1200 170" role="img" aria-labelledby="title desc">
  <title id="title">Arcade marquee</title>
  <desc id="desc">A neon arcade marquee for the Dovaklin GitHub profile.</desc>
  <defs>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DCFFF"/>
      <stop offset=".45" stop-color="#F2B35D"/>
      <stop offset="1" stop-color="#F7768E"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .flash{animation:flash 2.2s ease-in-out infinite}
      .slide{stroke-dasharray:16 18;animation:slide 10s linear infinite}
      @keyframes flash{0%,100%{opacity:.45}50%{opacity:1}}
      @keyframes slide{to{stroke-dashoffset:-340}}
    </style>
  </defs>
  <rect width="1200" height="170" rx="18" fill="#0D1117"/>
  <rect x="20" y="20" width="1160" height="130" rx="16" fill="#101826" stroke="#214E68" stroke-width="2"/>
  <path class="slide" d="M48 42H1152M48 128H1152" stroke="url(#rail)" stroke-width="4" opacity=".8"/>
  <g filter="url(#glow)">
    <text x="600" y="84" text-anchor="middle" class="ui" font-size="48" font-weight="900" fill="#F5F2E8">DOVAKLIN ARCADE</text>
    <text x="600" y="115" text-anchor="middle" class="mono" font-size="17" fill="#7DCFFF">PRESS START :: AGENTS / MCP / ROBOTICS / GAME SYSTEMS</text>
  </g>
  <g class="flash">
    <circle cx="86" cy="84" r="14" fill="#F2B35D"/>
    <circle cx="1114" cy="84" r="14" fill="#F7768E"/>
    <circle cx="142" cy="84" r="8" fill="#7DCFFF"/>
    <circle cx="1058" cy="84" r="8" fill="#7DCFFF"/>
  </g>
  <g fill="#8B949E" class="mono" font-size="11">
    <text x="52" y="146">INSERT TRACE</text>
    <text x="1071" y="146">READY</text>
  </g>
</svg>
