<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="190" viewBox="0 0 1200 190" role="img" aria-labelledby="title desc">
  <title id="title">Visitor ledger</title>
  <desc id="desc">A dark pixel-art inspired visitor ledger replacing broken counter images.</desc>
  <defs>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1200" height="190" rx="16" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="146" rx="14" fill="#101826" stroke="#214E68"/>
  <text x="54" y="67" class="ui" font-size="28" font-weight="800" fill="#F2B35D">Visitor Ledger</text>
  <text x="54" y="97" class="mono" font-size="14" fill="#8B949E">Broken counter services removed. One stable Shields counter remains below this local panel.</text>
  <g transform="translate(760 50)">
    <g fill="#7DCFFF">
      <rect x="0" y="28" width="16" height="52" rx="3"/>
      <rect x="24" y="16" width="16" height="64" rx="3"/>
      <rect x="48" y="36" width="16" height="44" rx="3"/>
      <rect x="72" y="8" width="16" height="72" rx="3"/>
      <rect x="96" y="25" width="16" height="55" rx="3"/>
    </g>
    <g fill="#F2B35D" opacity=".9">
      <circle cx="8" cy="18" r="7"/>
      <circle cx="32" cy="6" r="7"/>
      <circle cx="56" cy="26" r="7"/>
      <circle cx="80" cy="-2" r="7"/>
      <circle cx="104" cy="15" r="7"/>
    </g>
    <path d="M150 72 H332" stroke="#214E68" stroke-width="2"/>
    <text x="150" y="38" class="mono" font-size="16" fill="#F5F2E8">travelers logged</text>
    <text x="150" y="62" class="mono" font-size="13" fill="#7DCFFF">komarev badge tracks live visits</text>
  </g>
</svg>
