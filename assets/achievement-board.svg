<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Achievement board</title>
  <desc id="desc">A local dark achievement board replacing an unreliable external trophy service.</desc>
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
    </style>
  </defs>
  <rect width="1200" height="280" rx="16" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="236" rx="14" fill="#101826" stroke="#214E68"/>
  <text x="54" y="70" class="ui" font-size="30" font-weight="800" fill="#F2B35D">Achievement Board</text>
  <text x="54" y="99" class="mono" font-size="14" fill="#8B949E">Local SVG trophies: stable, dark-mode friendly, no third-party quota screen.</text>
  <g transform="translate(54 126)">
    <g>
      <rect width="190" height="92" rx="14" fill="url(#card)" stroke="#F2B35D"/>
      <path d="M95 19 107 51 141 52 114 72 123 105 95 86 67 105 76 72 49 52 83 51Z" transform="scale(.62) translate(58 4)" fill="#F2B35D"/>
      <text x="66" y="48" class="mono" font-size="15" fill="#F5F2E8">Agent Crafter</text>
      <text x="30" y="72" class="mono" font-size="12" fill="#8B949E">tool loops / workflows</text>
    </g>
    <g transform="translate(220 0)">
      <rect width="190" height="92" rx="14" fill="url(#card)" stroke="#7DCFFF"/>
      <circle cx="48" cy="42" r="18" fill="none" stroke="#7DCFFF" stroke-width="4"/>
      <circle cx="48" cy="42" r="5" fill="#7DCFFF"/>
      <text x="76" y="48" class="mono" font-size="15" fill="#F5F2E8">MCP Mapper</text>
      <text x="30" y="72" class="mono" font-size="12" fill="#8B949E">devices / protocols</text>
    </g>
    <g transform="translate(440 0)">
      <rect width="190" height="92" rx="14" fill="url(#card)" stroke="#F7768E"/>
      <path d="M38 62 58 25 78 62Z" fill="none" stroke="#F7768E" stroke-width="4"/>
      <path d="M48 62 58 44 68 62Z" fill="#F7768E"/>
      <text x="82" y="48" class="mono" font-size="15" fill="#F5F2E8">OS Delver</text>
      <text x="30" y="72" class="mono" font-size="12" fill="#8B949E">systems / kernels</text>
    </g>
    <g transform="translate(660 0)">
      <rect width="190" height="92" rx="14" fill="url(#card)" stroke="#F2B35D"/>
      <rect x="31" y="28" width="36" height="28" rx="5" fill="none" stroke="#F2B35D" stroke-width="4"/>
      <path d="M39 28 V18 H59 V28" fill="none" stroke="#F2B35D" stroke-width="4"/>
      <text x="80" y="48" class="mono" font-size="15" fill="#F5F2E8">Quest Keeper</text>
      <text x="30" y="72" class="mono" font-size="12" fill="#8B949E">docs / traces</text>
    </g>
    <g transform="translate(880 0)">
      <rect width="190" height="92" rx="14" fill="url(#card)" stroke="#7DCFFF"/>
      <path d="M31 55 C50 25 70 25 89 55" fill="none" stroke="#7DCFFF" stroke-width="4"/>
      <circle cx="45" cy="50" r="4" fill="#7DCFFF"/>
      <circle cx="75" cy="50" r="4" fill="#7DCFFF"/>
      <text x="97" y="48" class="mono" font-size="15" fill="#F5F2E8">Rover Pilot</text>
      <text x="30" y="72" class="mono" font-size="12" fill="#8B949E">robots / ROS</text>
    </g>
  </g>
</svg>
