<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="330" viewBox="0 0 1200 330" role="img" aria-labelledby="title desc">
  <title id="title">Quest map</title>
  <desc id="desc">An abstract dark RPG map connecting AI, MCP, robotics, OS, web, and return loop quests.</desc>
  <defs>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F5F2E8"/>
      <stop offset="0.45" stop-color="#7DCFFF"/>
      <stop offset="1" stop-color="#214E68"/>
    </radialGradient>
    <linearGradient id="land" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132235"/>
      <stop offset="0.55" stop-color="#211827"/>
      <stop offset="1" stop-color="#34210F"/>
    </linearGradient>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .route{fill:none;stroke:#7DCFFF;stroke-width:2;stroke-dasharray:7 8;opacity:.58}
      .hot{filter:drop-shadow(0 0 6px #F2B35D)}
    </style>
  </defs>
  <rect width="1200" height="330" rx="16" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="286" rx="14" fill="url(#land)" stroke="#214E68"/>
  <path d="M114 220 C160 118 255 81 370 102 C480 122 510 55 626 74 C734 92 764 165 890 144 C1001 126 1066 178 1090 246 C954 292 820 247 694 271 C548 300 448 248 322 270 C230 286 163 268 114 220Z" fill="#0F1724" stroke="#F2B35D" stroke-opacity=".35"/>
  <path class="route" d="M178 215 C294 146 350 178 470 135 S680 134 775 192 S940 218 1030 173"/>
  <path class="route" d="M470 135 C486 206 560 244 675 231 C754 222 812 178 874 113"/>
  <g class="hot">
    <circle cx="178" cy="215" r="15" fill="url(#node)"/>
    <circle cx="470" cy="135" r="15" fill="url(#node)"/>
    <circle cx="675" cy="231" r="15" fill="url(#node)"/>
    <circle cx="874" cy="113" r="15" fill="url(#node)"/>
    <circle cx="1030" cy="173" r="15" fill="url(#node)"/>
  </g>
  <g class="mono" font-size="14" fill="#F5F2E8">
    <text x="132" y="252">AGENT</text>
    <text x="424" y="104">MCP</text>
    <text x="634" y="269">ROBOTICS</text>
    <text x="831" y="84">OS LAB</text>
    <text x="985" y="211">RETURN</text>
  </g>
  <text x="54" y="68" class="ui" font-size="30" font-weight="800" fill="#F2B35D">Quest Map</text>
  <text x="54" y="96" class="mono" font-size="15" fill="#8B949E">A local dark-mode replacement for the white GeoJSON map.</text>
  <g opacity=".42" fill="#F5F2E8">
    <circle cx="101" cy="112" r="1.4"/>
    <circle cx="205" cy="74" r="1.2"/>
    <circle cx="342" cy="56" r="1.6"/>
    <circle cx="755" cy="62" r="1.2"/>
    <circle cx="1111" cy="91" r="1.4"/>
    <circle cx="1093" cy="263" r="1.2"/>
  </g>
</svg>
