<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">Portal gate</title>
  <desc id="desc">A science-fantasy portal gate with animated rings and quest panels.</desc>
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F5F2E8"/>
      <stop offset=".25" stop-color="#F2B35D"/>
      <stop offset=".58" stop-color="#F7768E"/>
      <stop offset="1" stop-color="#7DCFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7DCFFF"/>
      <stop offset=".55" stop-color="#AB9DF2"/>
      <stop offset="1" stop-color="#F2B35D"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .spin{transform-origin:600px 182px;animation:spin 18s linear infinite}
      .spin2{transform-origin:600px 182px;animation:spin 12s linear infinite reverse}
      .pulse{animation:pulse 3s ease-in-out infinite}
      .dash{stroke-dasharray:10 12;animation:dash 9s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      @keyframes pulse{0%,100%{opacity:.38}50%{opacity:1}}
      @keyframes dash{to{stroke-dashoffset:-220}}
    </style>
  </defs>
  <rect width="1200" height="390" rx="18" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="346" rx="16" fill="#101826" stroke="#214E68"/>
  <g opacity=".8">
    <circle cx="96" cy="58" r="1.8" fill="#F5F2E8"/>
    <circle cx="214" cy="96" r="1.2" fill="#7DCFFF"/>
    <circle cx="1044" cy="72" r="1.7" fill="#F2B35D"/>
    <circle cx="1108" cy="248" r="1.4" fill="#F7768E"/>
    <circle cx="326" cy="320" r="1.5" fill="#F5F2E8"/>
  </g>
  <circle cx="600" cy="182" r="126" fill="url(#core)" filter="url(#soft)" opacity=".9"/>
  <g class="spin">
    <ellipse cx="600" cy="182" rx="162" ry="64" fill="none" stroke="url(#beam)" stroke-width="3" opacity=".7"/>
    <ellipse cx="600" cy="182" rx="102" ry="172" fill="none" stroke="#F2B35D" stroke-width="2" opacity=".55"/>
  </g>
  <g class="spin2">
    <path d="M600 46 636 146 742 182 636 218 600 318 564 218 458 182 564 146Z" fill="none" stroke="#7DCFFF" stroke-width="3" opacity=".62"/>
    <circle cx="600" cy="182" r="92" fill="none" stroke="#F7768E" stroke-width="2" stroke-dasharray="8 14"/>
  </g>
  <circle cx="600" cy="182" r="42" fill="#0D1117" stroke="#F2B35D" stroke-width="3"/>
  <text x="600" y="177" text-anchor="middle" class="mono" font-size="15" fill="#F2B35D">GATE</text>
  <text x="600" y="197" text-anchor="middle" class="mono" font-size="13" fill="#7DCFFF">ONLINE</text>
  <g transform="translate(58 64)">
    <rect width="300" height="220" rx="14" fill="#0D1117" stroke="#214E68"/>
    <text x="24" y="38" class="ui" font-size="26" font-weight="800" fill="#F2B35D">Portal Gate</text>
    <text x="24" y="70" class="mono" font-size="14" fill="#8B949E">choose route / enter build</text>
    <path class="dash" d="M24 102H268" stroke="#7DCFFF" stroke-width="2" opacity=".8"/>
    <text x="24" y="138" class="mono" font-size="15" fill="#F5F2E8">01  agent workflow</text>
    <text x="24" y="168" class="mono" font-size="15" fill="#F5F2E8">02  device control</text>
    <text x="24" y="198" class="mono" font-size="15" fill="#F5F2E8">03  game systems</text>
  </g>
  <g transform="translate(842 64)">
    <rect width="300" height="220" rx="14" fill="#0D1117" stroke="#214E68"/>
    <text x="24" y="38" class="ui" font-size="26" font-weight="800" fill="#7DCFFF">Active Buffs</text>
    <text x="24" y="70" class="mono" font-size="14" fill="#8B949E">stable profile enchantments</text>
    <rect x="24" y="96" width="252" height="24" rx="12" fill="#214E68"/>
    <rect x="24" y="132" width="212" height="24" rx="12" fill="#351C2A"/>
    <rect x="24" y="168" width="232" height="24" rx="12" fill="#5B3B1A"/>
    <text x="38" y="113" class="mono" font-size="13" fill="#F5F2E8">local SVG engine</text>
    <text x="38" y="149" class="mono" font-size="13" fill="#F5F2E8">actions auto-sync</text>
    <text x="38" y="185" class="mono" font-size="13" fill="#F5F2E8">no blank widget trap</text>
  </g>
  <rect class="pulse" x="520" y="333" width="160" height="10" rx="5" fill="url(#beam)"/>
</svg>
