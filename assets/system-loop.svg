<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="310" viewBox="0 0 1200 310" role="img" aria-labelledby="title desc">
  <title id="title">System loop</title>
  <desc id="desc">A stable SVG replacement for Mermaid system loop.</desc>
  
    <style>
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .mono{font-family:Consolas,Monaco,monospace}
      .title{fill:#F2B35D;font:800 30px Segoe UI,Arial,sans-serif}
      .muted{fill:#8B949E;font:14px Consolas,Monaco,monospace}
      .body{fill:#F5F2E8;font:15px Segoe UI,Arial,sans-serif}
      .small{fill:#F5F2E8;font:12px Consolas,Monaco,monospace}
      .cyan{fill:#7DCFFF}.gold{fill:#F2B35D}.ember{fill:#F7768E}
    </style>
  
  <rect width="1200" height="310" rx="16" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="266" rx="14" fill="#101826" stroke="#214E68"/>
  <text x="54" y="70" class="title">System Loop</text>
  <text x="54" y="98" class="muted">intent → plan → tool → trace → test → artifact → return</text>
  <g transform="translate(74 158)">
      <circle cx="36" cy="36" r="34" fill="#0D1117" stroke="#7DCFFF" stroke-width="3"/>
      <text x="36" y="41" text-anchor="middle" class="small" fill="#F5F2E8">Intent</text>
    </g><g transform="translate(225 188)">
      <circle cx="36" cy="36" r="34" fill="#0D1117" stroke="#F2B35D" stroke-width="3"/>
      <text x="36" y="41" text-anchor="middle" class="small" fill="#F5F2E8">Plan</text>
    </g><g transform="translate(376 158)">
      <circle cx="36" cy="36" r="34" fill="#0D1117" stroke="#F7768E" stroke-width="3"/>
      <text x="36" y="41" text-anchor="middle" class="small" fill="#F5F2E8">Tool / MCP</text>
    </g><g transform="translate(527 188)">
      <circle cx="36" cy="36" r="34" fill="#0D1117" stroke="#7DCFFF" stroke-width="3"/>
      <text x="36" y="41" text-anchor="middle" class="small" fill="#F5F2E8">Trace</text>
    </g><g transform="translate(678 158)">
      <circle cx="36" cy="36" r="34" fill="#0D1117" stroke="#F2B35D" stroke-width="3"/>
      <text x="36" y="41" text-anchor="middle" class="small" fill="#F5F2E8">Test</text>
    </g><g transform="translate(829 188)">
      <circle cx="36" cy="36" r="34" fill="#0D1117" stroke="#F7768E" stroke-width="3"/>
      <text x="36" y="41" text-anchor="middle" class="small" fill="#F5F2E8">Artifact</text>
    </g><g transform="translate(980 158)">
      <circle cx="36" cy="36" r="34" fill="#0D1117" stroke="#7DCFFF" stroke-width="3"/>
      <text x="36" y="41" text-anchor="middle" class="small" fill="#F5F2E8">Return</text>
    </g>
  <path d="M146 195 C245 123 312 251 412 185 S584 146 684 203 S842 243 946 184 S1050 132 1110 192" fill="none" stroke="#214E68" stroke-width="3"/>
  <path d="M1065 178 1110 192 1078 225" fill="none" stroke="#F2B35D" stroke-width="3"/>
</svg>