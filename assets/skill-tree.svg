<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">Skill tree</title>
  <desc id="desc">A game-like animated skill tree for technologies and build themes.</desc>
  <defs>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7DCFFF"/>
      <stop offset=".5" stop-color="#F2B35D"/>
      <stop offset="1" stop-color="#F7768E"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .path{fill:none;stroke:url(#edge);stroke-width:3;stroke-dasharray:12 14;animation:dash 12s linear infinite}
      .node{filter:url(#glow);animation:pulse 3.8s ease-in-out infinite}
      @keyframes dash{to{stroke-dashoffset:-360}}
      @keyframes pulse{0%,100%{opacity:.72}50%{opacity:1}}
    </style>
  </defs>
  <rect width="1200" height="440" rx="18" fill="#0D1117"/>
  <rect x="22" y="22" width="1156" height="396" rx="16" fill="#101826" stroke="#214E68"/>
  <text x="54" y="70" class="ui" font-size="30" font-weight="800" fill="#F2B35D">Skill Tree</text>
  <text x="54" y="98" class="mono" font-size="14" fill="#8B949E">unlocked branches across agents, systems, robotics, web, and data</text>
  <path class="path" d="M600 210 C480 128 326 128 218 190"/>
  <path class="path" d="M600 210 C493 230 367 276 250 326"/>
  <path class="path" d="M600 210 C564 106 646 75 742 104"/>
  <path class="path" d="M600 210 C700 138 834 136 976 180"/>
  <path class="path" d="M600 210 C715 254 830 292 998 320"/>
  <g class="node">
    <circle cx="600" cy="210" r="54" fill="#F2B35D" opacity=".22" stroke="#F2B35D" stroke-width="3"/>
    <text x="600" y="205" text-anchor="middle" class="mono" font-size="17" font-weight="800" fill="#F5F2E8">CORE</text>
    <text x="600" y="226" text-anchor="middle" class="mono" font-size="12" fill="#0D1117">RETURN LOOP</text>
  </g>
  <g>
    <g transform="translate(108 142)">
      <rect width="220" height="86" rx="14" fill="#0D1117" stroke="#F7768E"/>
      <text x="20" y="34" class="mono" font-size="17" font-weight="800" fill="#F7768E">AI Agents</text>
      <text x="20" y="58" class="mono" font-size="12" fill="#F5F2E8">OpenAI / Dify / n8n / tools</text>
    </g>
    <g transform="translate(140 286)">
      <rect width="220" height="86" rx="14" fill="#0D1117" stroke="#7DCFFF"/>
      <text x="20" y="34" class="mono" font-size="17" font-weight="800" fill="#7DCFFF">Systems</text>
      <text x="20" y="58" class="mono" font-size="12" fill="#F5F2E8">Linux / Docker / Actions</text>
    </g>
    <g transform="translate(640 64)">
      <rect width="220" height="86" rx="14" fill="#0D1117" stroke="#A9DC76"/>
      <text x="20" y="34" class="mono" font-size="17" font-weight="800" fill="#A9DC76">Robotics</text>
      <text x="20" y="58" class="mono" font-size="12" fill="#F5F2E8">ROS / control / planning</text>
    </g>
    <g transform="translate(870 138)">
      <rect width="220" height="86" rx="14" fill="#0D1117" stroke="#AB9DF2"/>
      <text x="20" y="34" class="mono" font-size="17" font-weight="800" fill="#AB9DF2">Web Craft</text>
      <text x="20" y="58" class="mono" font-size="12" fill="#F5F2E8">Vue / JS / dashboards</text>
    </g>
    <g transform="translate(870 286)">
      <rect width="220" height="86" rx="14" fill="#0D1117" stroke="#F2B35D"/>
      <text x="20" y="34" class="mono" font-size="17" font-weight="800" fill="#F2B35D">Data Lab</text>
      <text x="20" y="58" class="mono" font-size="12" fill="#F5F2E8">PyTorch / OpenCV / SQL</text>
    </g>
  </g>
  <g fill="#8B949E" class="mono" font-size="12">
    <text x="54" y="394">rarity: mythic utility profile</text>
    <text x="966" y="394">next unlock: ship more playable tools</text>
  </g>
</svg>
