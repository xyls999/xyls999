<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Dovaklin RPG command center</title>
  <desc id="desc">A dark RPG and science fantasy command center banner for xyls999.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.45" stop-color="#102436"/>
      <stop offset="0.78" stop-color="#351C2A"/>
      <stop offset="1" stop-color="#5B3B1A"/>
    </linearGradient>
    <radialGradient id="portal" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#F2B35D" stop-opacity="0.95"/>
      <stop offset="0.34" stop-color="#F7768E" stop-opacity="0.65"/>
      <stop offset="0.68" stop-color="#7DCFFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#7DCFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#7DCFFF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <style>
      .mono{font-family:Consolas,Monaco,monospace}
      .ui{font-family:Segoe UI,Arial,sans-serif}
      .pulse{animation:pulse 3.2s ease-in-out infinite}
      .float{animation:float 5s ease-in-out infinite}
      .dash{stroke-dasharray:8 10;animation:dash 12s linear infinite}
      @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes dash{to{stroke-dashoffset:-180}}
    </style>
  </defs>
  <rect width="1200" height="430" fill="url(#bg)"/>
  <rect width="1200" height="430" fill="url(#grid)"/>
  <g opacity="0.85">
    <circle cx="97" cy="72" r="2" fill="#F5F2E8"/>
    <circle cx="183" cy="46" r="1.8" fill="#7DCFFF"/>
    <circle cx="315" cy="98" r="1.4" fill="#F2B35D"/>
    <circle cx="1016" cy="82" r="2" fill="#F5F2E8"/>
    <circle cx="1108" cy="137" r="1.6" fill="#7DCFFF"/>
    <circle cx="943" cy="208" r="1.5" fill="#F7768E"/>
    <circle cx="793" cy="49" r="1.2" fill="#F5F2E8"/>
    <circle cx="665" cy="83" r="1.5" fill="#7DCFFF"/>
  </g>
  <g transform="translate(760 58)" class="float">
    <circle cx="126" cy="132" r="112" fill="url(#portal)" filter="url(#glow)"/>
    <circle cx="126" cy="132" r="82" fill="none" stroke="#F2B35D" stroke-width="2" opacity="0.75"/>
    <circle cx="126" cy="132" r="56" fill="none" stroke="#7DCFFF" stroke-width="2" opacity="0.8"/>
    <path d="M126 54 151 119 220 132 151 145 126 210 101 145 32 132 101 119Z" fill="#F5F2E8" opacity="0.86"/>
    <path d="M126 82 141 123 184 132 141 141 126 182 111 141 68 132 111 123Z" fill="#0D1117"/>
  </g>
  <path class="dash" d="M90 318 C230 270 311 338 452 276 C590 216 654 259 766 192" fill="none" stroke="#7DCFFF" stroke-width="2" opacity="0.45"/>
  <path d="M0 334 C118 292 190 350 310 314 C444 274 548 345 680 292 C842 226 930 320 1200 246 L1200 430 L0 430Z" fill="#0D1117" opacity="0.82"/>
  <path d="M0 356 C116 318 185 368 313 340 C436 312 548 372 690 326 C838 280 954 338 1200 286" fill="none" stroke="#F2B35D" stroke-opacity="0.45" stroke-width="2"/>
  <g transform="translate(58 70)">
    <rect x="0" y="0" width="620" height="226" rx="18" fill="#0D1117" fill-opacity="0.78" stroke="#214E68" stroke-width="2"/>
    <rect x="22" y="22" width="132" height="34" rx="8" fill="#F2B35D" fill-opacity="0.16" stroke="#F2B35D" stroke-opacity="0.6"/>
    <text x="36" y="45" class="mono" font-size="15" fill="#F2B35D">SAVE SLOT 999</text>
    <text x="28" y="108" class="ui" font-size="58" font-weight="800" fill="#F5F2E8">DOVAKLIN</text>
    <text x="31" y="143" class="mono" font-size="22" fill="#7DCFFF">xyls999 :: agent systems / MCP / OS / robotics</text>
    <text x="31" y="181" class="ui" font-size="19" fill="#F5F2E8" opacity="0.88">To exist is to trust. To trust is to return.</text>
    <g transform="translate(30 202)">
      <rect width="122" height="30" rx="15" fill="#214E68"/>
      <rect x="142" width="148" height="30" rx="15" fill="#351C2A"/>
      <rect x="310" width="142" height="30" rx="15" fill="#5B3B1A"/>
      <text x="20" y="20" class="mono" font-size="13" fill="#F5F2E8">TRACEABLE</text>
      <text x="162" y="20" class="mono" font-size="13" fill="#F5F2E8">AGENTIC</text>
      <text x="330" y="20" class="mono" font-size="13" fill="#F5F2E8">GAME-MINDED</text>
    </g>
  </g>
  <g transform="translate(74 330)">
    <rect x="0" y="0" width="194" height="54" rx="10" fill="#111827" stroke="#214E68"/>
    <rect x="224" y="0" width="194" height="54" rx="10" fill="#111827" stroke="#214E68"/>
    <rect x="448" y="0" width="194" height="54" rx="10" fill="#111827" stroke="#214E68"/>
    <text x="18" y="22" class="mono" font-size="12" fill="#8B949E">QUEST</text>
    <text x="18" y="40" class="mono" font-size="16" fill="#7DCFFF">AI WORKFLOWS</text>
    <text x="242" y="22" class="mono" font-size="12" fill="#8B949E">SYSTEM</text>
    <text x="242" y="40" class="mono" font-size="16" fill="#F2B35D">MCP CONTROL</text>
    <text x="466" y="22" class="mono" font-size="12" fill="#8B949E">BUILD</text>
    <text x="466" y="40" class="mono" font-size="16" fill="#F7768E">RETURN LOOP</text>
  </g>
  <g class="pulse" opacity="0.85">
    <circle cx="760" cy="192" r="5" fill="#7DCFFF"/>
    <circle cx="886" cy="190" r="5" fill="#F2B35D"/>
    <circle cx="1012" cy="190" r="5" fill="#F7768E"/>
  </g>
</svg>
